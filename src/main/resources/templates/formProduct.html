<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" th:replace="template :: layout(~{::section})">
<section>
    <h1 class="mb-4" th:text="${product.id == null} ? 'Nouveau produit' : 'Éditer produit'"></h1>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/save}" th:object="${product}" method="post" class="row g-3">
                <div class="col-12">
                    <label for="name" class="form-label">Nom</label>
                    <input id="name" type="text" class="form-control" th:field="*{name}"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" />
                    <div class="text-danger mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="col-md-6">
                    <label for="price" class="form-label">Prix</label>
                    <input id="price" type="number" step="0.01" class="form-control" th:field="*{price}"
                           th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'" />
                    <div class="text-danger mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                </div>

                <div class="col-md-6">
                    <label for="quantity" class="form-label">Quantité</label>
                    <input id="quantity" type="number" class="form-control" th:field="*{quantity}"
                           th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid'" />
                    <div class="text-danger mt-1" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
                </div>

                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                    <a class="btn btn-secondary" th:href="@{/products}">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</section>
</html>
